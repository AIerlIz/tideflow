name: Release

on:
  push:
    branches: [main]
    paths: ['VERSION']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Read version
        id: ver
        run: |
          VERSION=$(cat VERSION)
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag
        run: |
          TAG="v${{ steps.ver.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists, skipping"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Will create tag $TAG"
          fi

      - name: Create tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Build binaries
        run: |
          V="${{ steps.ver.outputs.version }}"
          LDFLAGS="-s -w -X 'main.version=${V}' -X 'main.commitSHA=${{ steps.ver.outputs.commit }}' -X 'main.buildTime=${{ steps.ver.outputs.build_time }}'"
          mkdir -p dist

          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            OS="${t%/*}"
            ARCH="${t#*/}"
            EXT=""
            [ "$OS" = "windows" ] && EXT=".exe"
            NAME="tideflow-${V}-${OS}-${ARCH}${EXT}"
            echo "Building ${NAME} ..."
            CGO_ENABLED=0 GOOS="$OS" GOARCH="$ARCH" \
              go build -ldflags="$LDFLAGS" -o "dist/${NAME}" .
          done

          cd dist && sha256sum * > checksums.txt
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: TideFlow v${{ steps.ver.outputs.version }}
          files: dist/*
          generate_release_notes: true
