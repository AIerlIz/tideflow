name: Release

on:
  push:
    branches: [main]
    paths: ['VERSION']
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKERHUB_IMAGE: aierliz/tideflow

jobs:
  # ── 读版本号 ──────────────────────────────────
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      commit: ${{ steps.ver.outputs.commit }}
      build_time: ${{ steps.ver.outputs.build_time }}
      tag_exists: ${{ steps.tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: ver
        run: |
          VERSION=$(cat VERSION)
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "build_time=${BUILD_TIME}" >> $GITHUB_OUTPUT

      - name: Check tag
        id: tag
        run: |
          TAG="v$(cat VERSION)"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v$(cat VERSION)"
          git push origin "v$(cat VERSION)"

  # ── Docker 镜像 ──────────────────────────────
  docker:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
            type=ref,event=tag

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
            COMMIT_SHA=${{ needs.version.outputs.commit }}
            BUILD_TIME=${{ needs.version.outputs.build_time }}
          cache-from: |
            type=gha,scope=buildkit
            type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache
          cache-to: |
            type=gha,mode=max,scope=buildkit
            type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:buildcache,mode=max,image-manifest=true,oci-mediatypes=true,compression=zstd

  # ── 二进制发版 ──────────────────────────────
  binary:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          V="${{ needs.version.outputs.version }}"
          LDFLAGS="-s -w -X 'main.version=${V}' -X 'main.commitSHA=${{ needs.version.outputs.commit }}' -X 'main.buildTime=${{ needs.version.outputs.build_time }}'"
          mkdir -p dist

          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            OS="${t%/*}"
            ARCH="${t#*/}"
            EXT=""
            [ "$OS" = "windows" ] && EXT=".exe"
            NAME="tideflow-${V}-${OS}-${ARCH}${EXT}"
            echo "Building ${NAME} ..."
            CGO_ENABLED=0 GOOS="$OS" GOARCH="$ARCH" \
              go build -ldflags="$LDFLAGS" -o "dist/${NAME}" .
          done

          cd dist && sha256sum * > checksums.txt
          ls -lh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.version }}
          name: TideFlow v${{ needs.version.outputs.version }}
          files: dist/*
          generate_release_notes: true
