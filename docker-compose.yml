services:
  tideflow:
    image: aierliz/tideflow:latest
    container_name: tideflow
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data          # SQLite persistence
    environment:
      - ADMIN_PASSWORD=admin      # Web UI password
      - DATA_DIR=/app/data
